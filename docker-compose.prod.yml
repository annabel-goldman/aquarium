services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: /api
    image: ${DOCKER_REGISTRY:-local}/aquarium-app:latest
    container_name: aquarium-app
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - SQLITE_PATH=/data/aquarium.sqlite
      - STATIC_DIR=/app/static
      - JWT_SECRET=${JWT_SECRET}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - ENVIRONMENT=production
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost}
    volumes:
      - aquarium_data:/data
    deploy:
      resources:
        limits:
          memory: 180M
        reservations:
          memory: 60M

  caddy:
    image: caddy:2-alpine
    container_name: aquarium-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${APP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      - DOMAIN=${DOMAIN:-aquarium.annabelgoldman.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      resources:
        limits:
          memory: 80M
        reservations:
          memory: 20M

volumes:
  aquarium_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
