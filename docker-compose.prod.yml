services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: /api
    image: ${DOCKER_REGISTRY:-local}/aquarium-app:latest
    container_name: aquarium-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:8000"
    environment:
      - SQLITE_PATH=/data/aquarium.sqlite
      - STATIC_DIR=/app/static
      - JWT_SECRET=${JWT_SECRET}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - ENVIRONMENT=production
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost}
    volumes:
      - aquarium_data:/data
    deploy:
      resources:
        limits:
          memory: 180M
        reservations:
          memory: 60M

volumes:
  aquarium_data:
    driver: local
