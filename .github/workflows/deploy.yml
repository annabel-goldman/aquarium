name: Deploy to AWS Lightsail

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/aquarium-app:latest
          build-args: |
            VITE_API_BASE_URL=/api
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/aquarium-app:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/aquarium-app:buildcache,mode=max

      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          command_timeout: 10m
          script: |
            # Navigate to app directory
            cd ~/aquarium || exit 1
            
            # Pull latest code (for docker-compose.yml and nginx config)
            git pull origin main
            
            # Create .env file with secrets
            cat > .env << EOF
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DOCKER_REGISTRY=ghcr.io/${{ github.repository_owner }}
            APP_PORT=80
            HTTPS_PORT=443
            DOMAIN=aquarium.annabelgoldman.com
            COOKIE_SECURE=true
            ALLOWED_ORIGIN=https://aquarium.annabelgoldman.com
            EOF
            
            # Stop existing containers
            docker-compose -f docker-compose.prod.yml down
            
            # Pull latest images from GitHub Container Registry
            docker pull ghcr.io/${{ github.repository_owner }}/aquarium-app:latest
            
            # Start containers with pre-built images
            docker-compose -f docker-compose.prod.yml up -d
            
            # Clean up old images
            docker image prune -f
            
            # Show status
            echo "=== Deployment Status ==="
            docker-compose -f docker-compose.prod.yml ps
            
            echo "✅ Deployment complete!"

      - name: Verify deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            sleep 10
            cd ~/aquarium
            docker-compose -f docker-compose.prod.yml ps
            curl -f -H "Host: aquarium.annabelgoldman.com" http://localhost || echo "⚠️ Warning: Health check failed"
