services:
  # FastAPI backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aquarium-v2-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - sqlite_data:/data
    environment:
      - SQLITE_PATH=/data/aquarium.sqlite
      - JWT_SECRET=dev-secret-change-in-production
      - COOKIE_SECURE=false
      - ALLOWED_ORIGIN=http://localhost:5173
    networks:
      - aquarium-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aquarium-v2-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/public:/app/public
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    depends_on:
      - backend
    networks:
      - aquarium-network
    command: npm run dev -- --host

networks:
  aquarium-network:
    driver: bridge

volumes:
  sqlite_data:
    driver: local
